# ============================================================
# PostgREST Configuration — Oratioo CX Local
# ============================================================
# Documentación: https://docs.postgrest.org/en/stable/references/configuration.html

# Conexión a PostgreSQL
db-uri = "postgresql://authenticator:oratioo_authenticator_2024@localhost:5433/oratioo_cx"

# Esquema expuesto
db-schemas = "public"

# Rol anónimo (sin autenticar)
db-anon-role = "web_anon"

# Secreto JWT (cambia esto en producción)
jwt-secret = "oratioo-local-jwt-secret-change-in-production-2024"

# ── Server ────────────────────────────────────────
server-host = "0.0.0.0"
server-port = 3001

# ── Seguridad ────────────────────────────────────
# Permitir CORS para el frontend
server-cors-allowed-origins = "http://localhost:5173,http://localhost:3000"

# ── Respuesta ────────────────────────────────────
# Incluir conteo total en headers
db-pool = 10
db-pool-timeout = 10
db-max-rows = 1000

# ── Esquema JWT para el rol authenticator ────────
# jwt-role-claim-key = ".role"  (default)
